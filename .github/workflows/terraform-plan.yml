name: Terraform Plan

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/terraform-plan.yml"
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-plan.yml"

jobs:
  terraform:
    name: Terraform ${{ matrix.environment }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    defaults:
      run:
        working-directory: infra/envs/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../../

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -refresh=false -input=false -no-color -out=tfplan

      - name: Export plan
        run: terraform show -no-color tfplan > terraform-plan-${{ matrix.environment }}.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: infra/envs/${{ matrix.environment }}/terraform-plan-${{ matrix.environment }}.txt
